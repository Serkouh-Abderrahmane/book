<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a6b"/>
      <stop offset="100%" stop-color="#2d5aa0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#6bb3f0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circle -->
  <circle cx="1050" cy="100" r="320" fill="rgba(255,255,255,0.03)"/>
  <circle cx="-80" cy="500" r="240" fill="rgba(255,255,255,0.02)"/>

  <!-- Subtle grid pattern -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Accent bar -->
  <rect x="80" y="200" width="6" height="80" rx="3" fill="url(#accent)"/>

  <!-- Logo text -->
  <text x="110" y="195" font-family="'Plus Jakarta Sans','Inter',system-ui,sans-serif" font-size="22" font-weight="700" fill="#6bb3f0" letter-spacing="2">
    CHÍ VĨNH LAND
  </text>

  <!-- Main headline -->
  <text x="110" y="260" font-family="'Plus Jakarta Sans','Inter',system-ui,sans-serif" font-size="48" font-weight="800" fill="#ffffff" letter-spacing="-1">
    Cho thuê trọ
  </text>
  <text x="110" y="320" font-family="'Plus Jakarta Sans','Inter',system-ui,sans-serif" font-size="48" font-weight="800" fill="#ffffff" letter-spacing="-1">
    &amp; căn hộ Tp.HCM
  </text>

  <!-- Subtitle -->
  <text x="110" y="380" font-family="'Inter',system-ui,sans-serif" font-size="18" fill="rgba(255,255,255,0.6)" font-weight="400">
    Tìm phòng trọ, căn hộ, studio và chỗ ở chất lượng
  </text>

  <!-- Tag -->
  <rect x="110" y="410" width="160" height="32" rx="16" fill="rgba(255,255,255,0.1)"/>
  <text x="190" y="432" font-family="'Inter',system-ui,sans-serif" font-size="13" fill="#6bb3f0" font-weight="600" text-anchor="middle">
    TP. Hồ Chí Minh
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="rgba(0,0,0,0.15)"/>
  <text x="60" y="620" font-family="'Inter',system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.3)" font-weight="400">
    chi-vinh-land.vercel.app
  </text>
</svg>
